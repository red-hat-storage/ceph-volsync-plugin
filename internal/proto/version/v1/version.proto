syntax = "proto3";

package version.v1;

option go_package = "github.com/RamenDR/ceph-volsync-plugin/internal/proto/version/v1";

// VersionService provides version information
service VersionService {
  // GetVersion returns version information
  rpc GetVersion(GetVersionRequest) returns (GetVersionResponse);
}

// GetVersionRequest is the request message for GetVersion
message GetVersionRequest {
  // Empty request
}

// GetVersionResponse contains version information
message GetVersionResponse {
  // Semantic version string
  string version = 1;
}
